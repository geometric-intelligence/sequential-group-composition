# ============================================================================
# Configuration: Cyclic Group C_11
# ============================================================================
# C11 has order 11 and 6 frequency modes (0 through 5), all 1D

data:
  group_name: cn
  p: 11
  k: 2
  batch_size: 256
  seed: 10
  template_type: custom_fourier
  mode: exhaustive
  num_samples: 1000

  # custom_fourier powers (one per frequency mode 0..5)
  powers: [0.0, 200.0, 100.0, 50.0, 20.0, 5.]

model:
  model_type: TwoLayerNet
  hidden_dim: 100
  init_scale: 0.001
  nonlinearity: square
  output_scale: 1.0
  return_all_outputs: false
  transform_type: quadratic

training:
  mode: offline
  epochs: 5000
  num_steps: 100
  optimizer: per_neuron
  learning_rate: 0.02
  betas: [0.9, 0.999]
  weight_decay: 0.0
  degree: null
  scaling_factor: -3
  grad_clip: 0.1
  verbose_interval: 200
  save_param_interval: 1
  dense_save_until: 10
  reduction_threshold: null

device: cuda:0

analysis:
  checkpoints: [0.0, 1.0]
