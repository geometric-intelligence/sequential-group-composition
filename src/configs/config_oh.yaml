# ============================================================================
# Configuration: Octahedral Group
# ============================================================================
# Octahedral group has order 24 and 5 irreps with dimensions [1, 3, 3, 2, 1].

data:
  group_name: octahedral      # Group family: 'cn' | 'cnxcn' | 'dihedral' | 'octahedral' | 'A5'
  k: 2                        # Sequence length (number of group elements to compose)
  batch_size: 128             # Training batch size
  seed: 10                    # Random seed for reproducibility
  template_type: custom_fourier  # Template type: 'onehot' | 'custom_fourier'
  mode: sampled               # Dataset mode: 'sampled' | 'exhaustive'
  num_samples: 1000           # Number of samples (used when mode='sampled')

  # custom_fourier powers (one per irrep)
  # Octahedral irreps: [1, 3, 3, 2, 1]
  # From screenshot: rho4(1D)~1000, rho3(2D)~900, rho1(3D)~430, rho2(3D)~100
  powers: [0.0, 430.0, 100.0, 900.0, 1000.0]

model:
  model_type: TwoLayerMLP     # Model architecture: 'QuadraticRNN' | 'TwoLayerMLP'
  hidden_dim: 300             # Hidden layer width
  init_scale: 0.001           # Weight initialization scale
  nonlinearity: square        # Activation: 'square' | 'power' | 'relu' | 'tanh' | 'gelu' | 'linear'
  output_scale: 1.0           # Output layer scaling factor
  return_all_outputs: false   # true = seq-to-seq, false = seq-to-one (final output only)

training:
  mode: offline               # Training mode: 'online' (fresh samples) | 'offline' (fixed dataset)
  epochs: 10000                # Number of training epochs (offline mode)
  num_steps: 100              # Number of training steps (online mode)
  optimizer: per_neuron       # Optimizer: 'adam' | 'hybrid' | 'per_neuron'
  learning_rate: 0.02         # Base learning rate
  betas: [0.9, 0.999]        # Adam/hybrid beta parameters
  weight_decay: 0.0           # L2 regularization strength
  degree: null                # Homogeneity degree for 'per_neuron' (null = auto-infer)
  scaling_factor: -3          # Per-neuron norm exponent for 'hybrid' optimizer only
  grad_clip: 0.1              # Maximum gradient norm (0 = disabled)
  verbose_interval: 200       # Print loss every N epochs/steps
  save_param_interval: 10     # Save parameter snapshot every N epochs/steps
  dense_save_until: 10        # Save every epoch until this epoch (for early-training detail)
  reduction_threshold: null   # Early stopping: stop at this loss-reduction fraction (null = disabled)

device: cuda:0                # Device: 'cuda:N' | 'cpu'

analysis:
  checkpoints: [0.0, 1.0]    # Fractions of training at which to run analysis (0.0 = start, 1.0 = end)
