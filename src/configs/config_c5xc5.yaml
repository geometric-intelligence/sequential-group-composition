# ============================================================================
# Configuration: Product Group C_5 x C_5
# ============================================================================
# C5 x C5 has order 25 and 25 irreps (j1,j2) in row-major order.
# For a real template: power[j1,j2] = power[-j1 % 5, -j2 % 5].

data:
  group_name: cnxcn           # Group family: 'cn' | 'cnxcn' | 'dihedral' | 'octahedral' | 'A5'
  p1: 5                       # First cyclic group order / template height (cnxcn only)
  p2: 5                       # Second cyclic group order / template width (cnxcn only)
  k: 2                        # Sequence length (number of group elements to compose)
  batch_size: 128             # Training batch size
  seed: 10                    # Random seed for reproducibility
  template_type: custom_fourier  # Template type: 'mnist' | 'custom_fourier'
  # custom_fourier powers (one per irrep, 25 total, row-major (j1,j2))
  # Non-zero modes: (0,1)/(0,4)=10, (0,2)/(0,3)=4, (1,0)/(4,0)=12,
  #                 (1,1)/(4,4)=8, (2,0)/(3,0)=6
  powers: [0, 10, 4, 4, 10,
           12, 8, 0, 0, 0,
           6, 0, 0, 0, 0,
           6, 0, 0, 0, 0,
           12, 0, 0, 0, 8]
  mode: exhaustive            # Dataset mode: 'sampled' | 'exhaustive'
  num_samples: 1000           # Number of samples (used when mode='sampled')

model:
  model_type: TwoLayerMLP     # Model architecture: 'QuadraticRNN' | 'TwoLayerMLP'
  hidden_dim: 300             # Hidden layer width (hidden_factor=20 * group_size=25)
  init_scale: 0.00001          # Weight initialization scale
  nonlinearity: square        # Activation function (TwoLayerMLP only): 'square' | ...
  output_scale: 1.0           # Output layer scaling factor (TwoLayerMLP only)
  return_all_outputs: false   # true = seq-to-seq, false = seq-to-one (final output only)

training:
  mode: offline               # Training mode: 'online' (fresh samples) | 'offline' (fixed dataset)
  epochs: 100000             # Number of training epochs (offline mode)
  num_steps: 100              # Number of training steps (online mode)
  optimizer: per_neuron       # Optimizer: 'adam' | 'hybrid' | 'per_neuron'
  learning_rate: 0.01        # Base learning rate
  betas: [0.9, 0.999]        # Adam/hybrid beta parameters
  weight_decay: 0.0           # L2 regularization strength
  degree: null                # Homogeneity degree for 'per_neuron' (null = defaults to model.k)
  scaling_factor: -3          # Per-neuron norm exponent for 'hybrid' optimizer only
  grad_clip: 0.1              # Maximum gradient norm (0 = disabled)
  verbose_interval: 400       # Print loss every N epochs/steps
  save_param_interval: 1      # Save parameter snapshot every N epochs/steps
  reduction_threshold: null   # Early stopping: stop at this loss-reduction fraction (null = disabled)
  resume_from: null            # Run dir → checkpoints/final_model.pt, or path to .pt state_dict; optimizer starts fresh

device: cuda:0                # Device: 'cuda:N' | 'cpu'

analysis:
  checkpoints: [0.0, 1.0]    # Fractions of training at which to run analysis (0.0 = start, 1.0 = end)
